name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Check Gradle version
        run: gradle --version

      - name: Build debug APK
        id: build_apk
        continue-on-error: true
        run: |
          set -o pipefail
          gradle :app:assembleDebug --stacktrace --console=plain 2>&1 | tee build.log

      - name: Show real Gradle error
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "The useful error is usually below this line:"
          grep -n -A 35 -B 8 -E "FAILURE: Build failed|\\* What went wrong:|Execution failed|Compilation error|error:|A failure occurred" build.log || true
          exit 1

      - name: Upload debug APK
        if: steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hand-mouse-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: build.log
